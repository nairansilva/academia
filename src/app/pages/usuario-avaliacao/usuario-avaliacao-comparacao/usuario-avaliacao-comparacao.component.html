<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Comparativo de Avaliações</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="fechar()">Fechar</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content fullscreen>
  <div #comparacaoContainer class="comparacao-container">
    <ion-card>
      <ion-card-header>
        <ion-card-title>Composição Corporal</ion-card-title>
      </ion-card-header>
      <ion-card-content>
        <canvas #graficoCanvas style="max-height: 300px; width: 100%"></canvas>
      </ion-card-content>
    </ion-card>

    <ion-card>
      <ion-card-header>
        <ion-card-title>Perímetros Corporais (cm)</ion-card-title>
      </ion-card-header>
      <ion-card-content>
        <ion-segment [value]="tipoComparacao" (ionChange)="trocarTipo($event)" color="primary" class="segmento-tipo">
          <ion-segment-button value="barras">
            <ion-label>Barras</ion-label>
          </ion-segment-button>
          <ion-segment-button value="radar">
            <ion-label>Radar</ion-label>
          </ion-segment-button>
        </ion-segment>
        <canvas #graficoPeriMetrosCanvas style="max-height: 300px; width: 100%"></canvas>
      </ion-card-content>
    </ion-card>

    <ion-card>
      <ion-card-header>
        <ion-card-title>Força Muscular</ion-card-title>
      </ion-card-header>
      <ion-card-content>
        <canvas #graficoForcaCanvas style="max-height: 300px; width: 100%"></canvas>
      </ion-card-content>
    </ion-card>
  </div>

</ion-content>

<ion-footer>
  <ion-toolbar class="footer-toolbar">
    <div class="rodape-modal">
      <ion-button expand="block" class="btn-compartilhar" (click)="compartilhar()">
        <ion-icon slot="start" name="share-social"></ion-icon>
        Compartilhar
      </ion-button>
    </div>
  </ion-toolbar>
</ion-footer>
